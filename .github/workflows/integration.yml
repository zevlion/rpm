name: integration-test

jobs:
    test:
        name: test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      shell: bash
                      rpm_bin: rpm
                      install_cmd: |
                          curl -fsSL "https://raw.githubusercontent.com/zevlion/rpm/refs/heads/master/scripts/linux-installer.sh" | bash

                    - os: macos-latest
                      shell: bash
                      rpm_bin: rpm
                      install_cmd: |
                          curl -fsSL "https://raw.githubusercontent.com/zevlion/rpm/refs/heads/master/scripts/macos-installer.sh" | bash

                    - os: windows-latest
                      shell: pwsh
                      rpm_bin: rpm.exe
                      install_cmd: |
                          irm "https://raw.githubusercontent.com/zevlion/rpm/refs/heads/master/scripts/windows-installer.ps1" | iex

        defaults:
            run:
                shell: ${{ matrix.shell }}

        steps:
            # ── install rpm ──────────────────────────────────────────────────

            - name: checkout
              uses: actions/checkout@v4

            - name: install rpm
              run: ${{ matrix.install_cmd }}

            - name: verify rpm is on PATH
              run: rpm --version

            # ── build test rust binary ────────────────────────────────────────

            - name: install rust
              uses: dtolnay/rust-toolchain@stable

            - name: build test binary (unix)
              if: matrix.os != 'windows-latest'
              run: |
                  mkdir -p test-fixtures/rust-proc/src
                  cat > test-fixtures/rust-proc/Cargo.toml << 'EOF'
                  [package]
                  name = "test-proc"
                  version = "0.1.0"
                  edition = "2021"
                  EOF
                  cat > test-fixtures/rust-proc/src/main.rs << 'EOF'
                  use std::time::Duration;
                  fn main() {
                      let args: Vec<String> = std::env::args().collect();
                      if args.get(1).map(|s| s.as_str()) == Some("--crash") {
                          eprintln!("test-proc: intentional crash");
                          std::process::exit(1);
                      }
                      loop {
                          println!("test-proc: tick");
                          std::thread::sleep(Duration::from_secs(1));
                      }
                  }
                  EOF
                  cd test-fixtures/rust-proc && cargo build --release

            - name: build test binary (windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path test-fixtures/rust-proc/src | Out-Null
                  @"
                  [package]
                  name = "test-proc"
                  version = "0.1.0"
                  edition = "2021"
                  "@ | Set-Content test-fixtures/rust-proc/Cargo.toml
                  @"
                  use std::time::Duration;
                  fn main() {
                      let args: Vec<String> = std::env::args().collect();
                      if args.get(1).map(|s| s.as_str()) == Some("--crash") {
                          eprintln!("test-proc: intentional crash");
                          std::process::exit(1);
                      }
                      loop {
                          println!("test-proc: tick");
                          std::thread::sleep(Duration::from_secs(1));
                      }
                  }
                  "@ | Set-Content test-fixtures/rust-proc/src/main.rs
                  cd test-fixtures/rust-proc; cargo build --release

            # ── write test scripts ────────────────────────────────────────────

            - name: write test scripts (unix)
              if: matrix.os != 'windows-latest'
              run: |
                  cat > /tmp/loop.sh << 'EOF'
                  #!/usr/bin/env bash
                  while true; do echo "loop: tick"; sleep 1; done
                  EOF
                  chmod +x /tmp/loop.sh

                  cat > /tmp/ticker.py << 'EOF'
                  import time
                  while True:
                      print("python: tick", flush=True)
                      time.sleep(1)
                  EOF

                  cat > /tmp/ticker.js << 'EOF'
                  setInterval(() => console.log("node: tick"), 1000);
                  EOF

                  cat > /tmp/crasher.sh << 'EOF'
                  #!/usr/bin/env bash
                  echo "crasher: about to exit with failure"
                  exit 1
                  EOF
                  chmod +x /tmp/crasher.sh

                  cat > /tmp/three-lines.sh << 'EOF'
                  #!/usr/bin/env bash
                  echo "line-one"
                  sleep 0.2
                  echo "line-two"
                  sleep 0.2
                  echo "line-three"
                  sleep 0.2
                  EOF
                  chmod +x /tmp/three-lines.sh

            - name: write test scripts (windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  @"
                  :loop
                  echo loop: tick
                  timeout /t 1 /nobreak >nul
                  goto loop
                  "@ | Set-Content $env:TEMP\loop.bat

                  @"
                  import time
                  while True:
                      print('python: tick', flush=True)
                      time.sleep(1)
                  "@ | Set-Content $env:TEMP\ticker.py

                  @"
                  setInterval(() => console.log('node: tick'), 1000);
                  "@ | Set-Content $env:TEMP\ticker.js

                  @"
                  echo crasher: about to exit with failure
                  exit 1
                  "@ | Set-Content $env:TEMP\crasher.bat

                  @"
                  echo line-one
                  timeout /t 1 /nobreak >nul
                  echo line-two
                  timeout /t 1 /nobreak >nul
                  echo line-three
                  timeout /t 1 /nobreak >nul
                  "@ | Set-Content $env:TEMP\three-lines.bat

            # ── write assert helpers ──────────────────────────────────────────

            - name: write assert helper (unix)
              if: matrix.os != 'windows-latest'
              run: |
                  cat > /tmp/assert.sh << 'EOF'
                  #!/usr/bin/env bash
                  assert_running() {
                      local name="$1"
                      if ! rpm ls 2>/dev/null | grep -q "$name"; then
                          echo "✗ FAIL: expected '$name' to appear in rpm ls" >&2
                          rpm ls
                          exit 1
                      fi
                      echo "✓ '$name' is listed"
                  }
                  assert_not_running() {
                      local name="$1"
                      if rpm ls 2>/dev/null | grep -q "$name"; then
                          echo "✗ FAIL: expected '$name' to be absent from rpm ls" >&2
                          rpm ls
                          exit 1
                      fi
                      echo "✓ '$name' is not listed"
                  }
                  EOF
                  chmod +x /tmp/assert.sh

            - name: write assert helper (windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  @"
                  function Assert-Running([string]`$name) {
                      `$list = rpm ls 2>`$null
                      if (-not (`$list | Select-String `$name)) {
                          Write-Host "✗ FAIL: expected '`$name' in rpm ls" -ForegroundColor Red
                          rpm ls
                          exit 1
                      }
                      Write-Host "✓ '`$name' is listed" -ForegroundColor Green
                  }
                  function Assert-NotRunning([string]`$name) {
                      `$list = rpm ls 2>`$null
                      if (`$list | Select-String `$name) {
                          Write-Host "✗ FAIL: expected '`$name' absent from rpm ls" -ForegroundColor Red
                          rpm ls
                          exit 1
                      }
                      Write-Host "✓ '`$name' not listed" -ForegroundColor Green
                  }
                  "@ | Set-Content $env:TEMP\assert.ps1

            # ══════════════════════════════════════════════════════════════════
            # TEST 1 — start / ls / stop / restart / delete (shell script)
            # ══════════════════════════════════════════════════════════════════

            - name: "test 1a: start shell loop"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm start /tmp/loop.sh --name shell-loop
                  sleep 1
                  source /tmp/assert.sh && assert_running "shell-loop"

            - name: "test 1a: start shell loop (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm start $env:TEMP\loop.bat --name shell-loop
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "shell-loop"

            - name: "test 1b: stop shell loop"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm stop shell-loop
                  sleep 1
                  source /tmp/assert.sh && assert_running "shell-loop"

            - name: "test 1b: stop shell loop (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm stop shell-loop
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "shell-loop"

            - name: "test 1c: restart shell loop"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm restart shell-loop
                  sleep 1
                  source /tmp/assert.sh && assert_running "shell-loop"

            - name: "test 1c: restart shell loop (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm restart shell-loop
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "shell-loop"

            - name: "test 1d: delete shell loop"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm delete shell-loop
                  sleep 1
                  source /tmp/assert.sh && assert_not_running "shell-loop"

            - name: "test 1d: delete shell loop (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm delete shell-loop
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-NotRunning "shell-loop"

            # ══════════════════════════════════════════════════════════════════
            # TEST 2 — python3 process
            # ══════════════════════════════════════════════════════════════════

            - name: "test 2: start / stop python process"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm start /tmp/ticker.py --interpreter python3 --name py-ticker
                  sleep 1
                  source /tmp/assert.sh && assert_running "py-ticker"
                  rpm delete py-ticker
                  sleep 1
                  assert_not_running "py-ticker"

            - name: "test 2: start / stop python process (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm start $env:TEMP\ticker.py --interpreter python --name py-ticker
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "py-ticker"
                  rpm delete py-ticker
                  Start-Sleep 1
                  Assert-NotRunning "py-ticker"

            # ══════════════════════════════════════════════════════════════════
            # TEST 3 — node.js process
            # ══════════════════════════════════════════════════════════════════

            - name: "test 3: start / stop node process"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm start /tmp/ticker.js --interpreter node --name node-ticker
                  sleep 1
                  source /tmp/assert.sh && assert_running "node-ticker"
                  rpm delete node-ticker
                  sleep 1
                  assert_not_running "node-ticker"

            - name: "test 3: start / stop node process (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm start $env:TEMP\ticker.js --interpreter node --name node-ticker
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "node-ticker"
                  rpm delete node-ticker
                  Start-Sleep 1
                  Assert-NotRunning "node-ticker"

            # ══════════════════════════════════════════════════════════════════
            # TEST 4 — compiled rust binary
            # ══════════════════════════════════════════════════════════════════

            - name: "test 4: start / stop rust binary"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm start ./test-fixtures/rust-proc/target/release/test-proc --name rust-proc
                  sleep 1
                  source /tmp/assert.sh && assert_running "rust-proc"
                  rpm delete rust-proc
                  sleep 1
                  assert_not_running "rust-proc"

            - name: "test 4: start / stop rust binary (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm start .\test-fixtures\rust-proc\target\release\test-proc.exe --name rust-proc
                  Start-Sleep 1
                  . $env:TEMP\assert.ps1; Assert-Running "rust-proc"
                  rpm delete rust-proc
                  Start-Sleep 1
                  Assert-NotRunning "rust-proc"

            # ══════════════════════════════════════════════════════════════════
            # TEST 5 — --watch auto-restarts a crashed process
            # ══════════════════════════════════════════════════════════════════

            - name: "test 5: --watch restarts crashed process"
              if: matrix.os != 'windows-latest'
              run: |
                  source /tmp/assert.sh
                  rpm start /tmp/crasher.sh --name crasher --watch
                  echo "waiting for crash + restart cycles..."
                  sleep 4
                  assert_running "crasher"

                  RESTARTS=$(rpm ls | grep crasher | awk '{print $NF}')
                  if [ "${RESTARTS:-0}" -lt 1 ] 2>/dev/null; then
                      echo "✗ FAIL: expected restart count > 0, got: $RESTARTS" >&2
                      exit 1
                  fi
                  echo "✓ restart count is $RESTARTS"
                  rpm delete crasher

            - name: "test 5: --watch restarts crashed process (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  . $env:TEMP\assert.ps1
                  rpm start $env:TEMP\crasher.bat --name crasher --watch
                  Write-Host "waiting for crash + restart cycles..."
                  Start-Sleep 4
                  Assert-Running "crasher"

                  $line = rpm ls | Select-String "crasher"
                  $restarts = ($line -split '\s+')[-1]
                  if ([int]$restarts -lt 1) {
                      Write-Host "✗ FAIL: expected restart count > 0, got: $restarts" -ForegroundColor Red
                      exit 1
                  }
                  Write-Host "✓ restart count is $restarts" -ForegroundColor Green
                  rpm delete crasher

            # ══════════════════════════════════════════════════════════════════
            # TEST 6 — --attach streams output
            # ══════════════════════════════════════════════════════════════════

            - name: "test 6: --attach streams output"
              if: matrix.os != 'windows-latest'
              run: |
                  OUTPUT=$(timeout 10s rpm start /tmp/three-lines.sh --name streamer --attach 2>&1 || true)
                  echo "captured output: $OUTPUT"

                  if ! echo "$OUTPUT" | grep -q "line-one"; then
                      echo "✗ FAIL: expected 'line-one' in attach output" >&2
                      echo "full output was: $OUTPUT" >&2
                      exit 1
                  fi
                  if ! echo "$OUTPUT" | grep -q "line-three"; then
                      echo "✗ FAIL: expected 'line-three' in attach output" >&2
                      echo "full output was: $OUTPUT" >&2
                      exit 1
                  fi
                  echo "✓ --attach streamed all output lines correctly"
                  rpm delete streamer 2>/dev/null || true

            - name: "test 6: --attach streams output (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  $job = Start-Job {
                      rpm start $env:TEMP\three-lines.bat --name streamer --attach 2>&1
                  }
                  $completed = Wait-Job $job -Timeout 15
                  if (-not $completed) {
                      Stop-Job $job
                      Write-Host "✗ FAIL: --attach timed out after 15s" -ForegroundColor Red
                      exit 1
                  }
                  $output = Receive-Job $job
                  Write-Host "captured output: $output"

                  if (-not ($output | Select-String "line-one")) {
                      Write-Host "✗ FAIL: expected 'line-one' in attach output" -ForegroundColor Red
                      exit 1
                  }
                  if (-not ($output | Select-String "line-three")) {
                      Write-Host "✗ FAIL: expected 'line-three' in attach output" -ForegroundColor Red
                      exit 1
                  }
                  Write-Host "✓ --attach streamed all output lines correctly" -ForegroundColor Green
                  rpm delete streamer 2>$null

            # ══════════════════════════════════════════════════════════════════
            # TEST 7 — rpm kill stops the daemon cleanly
            # ══════════════════════════════════════════════════════════════════

            - name: "test 7: kill stops daemon cleanly"
              if: matrix.os != 'windows-latest'
              run: |
                  rpm start /tmp/loop.sh --name pre-kill-proc
                  sleep 1
                  rpm kill
                  sleep 1

                  if rpm ls 2>/dev/null; then
                      echo "✗ FAIL: daemon still responding after kill" >&2
                      exit 1
                  fi
                  echo "✓ daemon is not responding after kill"

            - name: "test 7: kill stops daemon cleanly (windows)"
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  rpm start $env:TEMP\loop.bat --name pre-kill-proc
                  Start-Sleep 1
                  rpm kill
                  Start-Sleep 1

                  try {
                      $result = rpm ls 2>$null
                      Write-Host "✗ FAIL: daemon still responding after kill" -ForegroundColor Red
                      exit 1
                  } catch {
                      Write-Host "✓ daemon is not responding after kill" -ForegroundColor Green
                  }

            # ── final summary ─────────────────────────────────────────────────

            - name: all tests passed
              run: echo "✓ all integration tests passed on ${{ matrix.os }}"